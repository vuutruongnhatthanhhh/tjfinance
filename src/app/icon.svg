<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Nền xanh bo góc -->
  <rect width="32" height="32" rx="8" fill="#2D9A4B"/>
  <!-- Tờ tiền (banknote) - viền ngoài -->
  <rect x="4" y="10" width="24" height="14" rx="2" stroke="white" stroke-width="2" fill="none"/>
  <!-- Đường kẻ trái -->
  <line x1="8" y1="10" x2="8" y2="24" stroke="white" stroke-width="1.5"/>
  <!-- Đường kẻ phải -->
  <line x1="24" y1="10" x2="24" y2="24" stroke="white" stroke-width="1.5"/>
  <!-- Hình tròn giữa (mệnh giá) -->
  <circle cx="16" cy="17" r="3.5" stroke="white" stroke-width="1.8" fill="none"/>
</svg>
